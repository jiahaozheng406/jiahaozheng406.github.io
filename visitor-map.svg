<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 559" role="img" aria-labelledby="title desc">
  <title id="title">Visitor Map</title>
  <desc id="desc">A DeepThink-style visitor map showing 442 historical pageviews across Nanjing, Beijing, Shanghai, Hangzhou, Hong Kong, Macau, Singapore, and the United States.</desc>

  <defs>
    <filter id="marker-shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.8" flood-color="#174a72" flood-opacity="0.34"/>
    </filter>
    <style>
      .counter {
        fill: #ffffff;
        font: 600 22px Arial, Helvetica, sans-serif;
        text-anchor: middle;
        paint-order: stroke;
        stroke: rgba(38, 99, 143, 0.25);
        stroke-width: 2px;
      }
      .halo-green { fill: #16a34a; opacity: .18; }
      .halo-orange { fill: #f59e0b; opacity: .20; }
      .marker-green {
        fill: #16b43f;
        stroke: #ffffff;
        stroke-width: 2.6;
        filter: url(#marker-shadow);
      }
      .marker-orange {
        fill: #ff970f;
        stroke: #ffffff;
        stroke-width: 2.6;
        filter: url(#marker-shadow);
      }
      .marker-blue {
        fill: #1d8bd1;
        stroke: #ffffff;
        stroke-width: 2.4;
        filter: url(#marker-shadow);
      }
    </style>
  </defs>

  <text class="counter" x="500" y="34">442 Pageviews</text>

  <!-- United States: 48 historical visits -->
  <g>
    <title>United States — 48 visits</title>
    <circle class="halo-green" cx="165" cy="194" r="18"/>
    <circle class="marker-green" cx="165" cy="194" r="8.5"/>

    <circle class="halo-orange" cx="214" cy="203" r="16"/>
    <circle class="marker-orange" cx="214" cy="203" r="7.5"/>

    <circle class="halo-green" cx="245" cy="186" r="15"/>
    <circle class="marker-green" cx="245" cy="186" r="7"/>

    <circle class="halo-orange" cx="273" cy="222" r="13"/>
    <circle class="marker-orange" cx="273" cy="222" r="6.3"/>

    <circle class="halo-green" cx="194" cy="222" r="11"/>
    <circle class="marker-green" cx="194" cy="222" r="5.4"/>
  </g>

  <!-- Europe / international academic reach -->
  <g>
    <circle class="halo-green" cx="488" cy="171" r="13"/>
    <circle class="marker-green" cx="488" cy="171" r="6.2"/>

    <circle class="halo-orange" cx="526" cy="178" r="12"/>
    <circle class="marker-orange" cx="526" cy="178" r="5.8"/>

    <circle class="halo-green" cx="558" cy="190" r="10"/>
    <circle class="marker-green" cx="558" cy="190" r="4.9"/>
  </g>

  <!-- Beijing: 73 historical visits -->
  <g>
    <title>Beijing — 73 visits</title>
    <circle class="halo-green" cx="771" cy="204" r="17"/>
    <circle class="marker-green" cx="771" cy="204" r="8.1"/>
  </g>

  <!-- Nanjing: 116 historical visits -->
  <g>
    <title>Nanjing — 116 visits</title>
    <circle class="halo-green" cx="780" cy="223" r="23"/>
    <circle class="marker-green" cx="780" cy="223" r="10.5"/>
  </g>

  <!-- Shanghai: 68 historical visits -->
  <g>
    <title>Shanghai — 68 visits</title>
    <circle class="halo-orange" cx="795" cy="225" r="17"/>
    <circle class="marker-orange" cx="795" cy="225" r="8"/>
  </g>

  <!-- Hangzhou: 52 historical visits -->
  <g>
    <title>Hangzhou — 52 visits</title>
    <circle class="halo-orange" cx="789" cy="236" r="15"/>
    <circle class="marker-orange" cx="789" cy="236" r="7"/>
  </g>

  <!-- Hong Kong: 34 historical visits -->
  <g>
    <title>Hong Kong — 34 visits</title>
    <circle class="halo-green" cx="781" cy="254" r="13"/>
    <circle class="marker-green" cx="781" cy="254" r="6.1"/>
  </g>

  <!-- Macau: 12 historical visits -->
  <g>
    <title>Macau — 12 visits</title>
    <circle class="halo-orange" cx="775" cy="257" r="9"/>
    <circle class="marker-orange" cx="775" cy="257" r="4.5"/>
  </g>

  <!-- Singapore: 39 historical visits -->
  <g>
    <title>Singapore — 39 visits</title>
    <circle class="halo-green" cx="744" cy="322" r="15"/>
    <circle class="marker-green" cx="744" cy="322" r="7.1"/>
  </g>

  <!-- Additional dense markers matching the MapMyVisitors visual style -->
  <g aria-hidden="true">
    <circle class="marker-blue" cx="807" cy="216" r="4.7"/>
    <circle class="marker-green" cx="799" cy="241" r="4.8"/>
    <circle class="marker-orange" cx="765" cy="233" r="4.6"/>
    <circle class="marker-green" cx="758" cy="291" r="5"/>
    <circle class="marker-orange" cx="831" cy="216" r="5"/>
    <circle class="marker-green" cx="864" cy="394" r="6.8"/>
    <circle class="marker-orange" cx="313" cy="332" r="5.5"/>
    <circle class="marker-green" cx="652" cy="258" r="5.8"/>
  </g>
</svg>
