    <circle class="halo" cx="751" cy="292" r="10"/><circle class="dot2" cx="751" cy="292" r="4.8"/>
    <circle class="halo" cx="744" cy="318" r="12"/><circle class="dot" cx="744" cy="318" r="5.8"/>
    <circle class="halo" cx="759" cy="323" r="9"/><circle class="dot3" cx="759" cy="323" r="4.3"/>
