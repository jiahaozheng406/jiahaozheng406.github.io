    <circle class="halo" cx="608" cy="226" r="9"/><circle class="dot2" cx="608" cy="226" r="4.4"/>
    <circle class="halo" cx="652" cy="258" r="12"/><circle class="dot" cx="652" cy="258" r="5.8"/>
