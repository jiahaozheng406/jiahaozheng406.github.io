    <circle class="halo" cx="311" cy="331" r="11"/><circle class="dot" cx="311" cy="331" r="5.3"/>
    <circle class="halo" cx="326" cy="355" r="9"/><circle class="dot2" cx="326" cy="355" r="4.5"/>
    <circle class="halo" cx="298" cy="381" r="8"/><circle class="dot3" cx="298" cy="381" r="4"/>
  </g>

  <!-- Europe -->
  <g>
    <circle class="halo" cx="489" cy="164" r="11"/><circle class="dot" cx="489" cy="164" r="5.2"/>
    <circle class="halo" cx="503" cy="172" r="10"/><circle class="dot2" cx="503" cy="172" r="4.9"/>
    <circle class="halo" cx="518" cy="166" r="12"/><circle class="dot" cx="518" cy="166" r="5.8"/>
    <circle class="halo" cx="531" cy="177" r="9"/><circle class="dot3" cx="531" cy="177" r="4.3"/>
    <circle class="halo" cx="546" cy="170" r="10"/><circle class="dot2" cx="546" cy="170" r="4.8"/>
