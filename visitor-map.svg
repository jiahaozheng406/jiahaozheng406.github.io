<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 559" role="img" aria-label="Visitor locations">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.8" flood-color="#174ea6" flood-opacity="0.28"/>
    </filter>
    <style>
      .halo{fill:#1d4ed8;opacity:.16}
      .dot{fill:#2563eb;stroke:#ffffff;stroke-width:2.2;filter:url(#glow)}
      .dot2{fill:#60a5fa;stroke:#ffffff;stroke-width:2;filter:url(#glow)}
      .dot3{fill:#64748b;stroke:#ffffff;stroke-width:1.8;filter:url(#glow)}
    </style>
  </defs>

  <!-- North America -->
  <g>
    <circle class="halo" cx="156" cy="190" r="13"/><circle class="dot" cx="156" cy="190" r="6.2"/>
    <circle class="halo" cx="184" cy="204" r="12"/><circle class="dot2" cx="184" cy="204" r="5.8"/>
    <circle class="halo" cx="214" cy="198" r="14"/><circle class="dot" cx="214" cy="198" r="6.8"/>
    <circle class="halo" cx="241" cy="185" r="11"/><circle class="dot3" cx="241" cy="185" r="5.1"/>
    <circle class="halo" cx="263" cy="204" r="10"/><circle class="dot2" cx="263" cy="204" r="4.8"/>
    <circle class="halo" cx="285" cy="189" r="12"/><circle class="dot" cx="285" cy="189" r="5.8"/>
    <circle class="halo" cx="297" cy="215" r="9"/><circle class="dot2" cx="297" cy="215" r="4.4"/>
    <circle class="halo" cx="196" cy="222" r="9"/><circle class="dot3" cx="196" cy="222" r="4.2"/>
  </g>

  <!-- South America -->
