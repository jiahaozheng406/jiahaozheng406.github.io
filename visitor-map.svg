    <circle class="halo" cx="778" cy="246" r="10"/><circle class="dot2" cx="778" cy="246" r="4.8"/>
    <circle class="halo" cx="798" cy="211" r="8"/><circle class="dot3" cx="798" cy="211" r="4"/>
    <circle class="halo" cx="804" cy="228" r="9"/><circle class="dot" cx="804" cy="228" r="4.4"/>
